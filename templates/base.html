<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% block title %}{{ agency.name }}{% endblock %}</title>
    <meta name="description" content="{{ agency.tagline }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --gold: #C9A96E;
            --gold-light: #E8C98A;
            --gold-dark: #A07840;
            --black: #0A0A0A;
            --black-soft: #111111;
            --black-card: #161616;
            --black-border: #2A2A2A;
            --white: #FFFFFF;
            --white-soft: #F5F0E8;
            --gray: #888888;
            --gray-light: #CCCCCC;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(201,169,110,0.15);
            --shadow-dark: 0 8px 40px rgba(0,0,0,0.6);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }

        /* ===== NAV ===== */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(10,10,10,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--black-border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
        }
        .nav-menu { display: flex; gap: 4px; }
        .nav-menu a {
            padding: 8px 10px;
            font-size: 13px;
            color: var(--gray-light);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-menu a:hover, .nav-menu a.active {
            color: var(--gold);
            background: rgba(201,169,110,0.08);
        }
        .nav-call {
            width: 36px; height: 36px;
            background: var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--black);
            font-size: 15px;
            transition: all 0.2s;
        }
        .nav-call:hover { background: var(--gold-light); transform: scale(1.05); }

        /* ===== PAGE WRAPPER ===== */
        .page { padding-top: 56px; }

        /* ===== GOLD DIVIDER ===== */
        .gold-line {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 24px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--white);
            text-align: center;
            margin-bottom: 8px;
        }
        .section-sub {
            font-size: 13px;
            color: var(--gray);
            text-align: center;
            margin-bottom: 28px;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--black-card);
            border: 1px solid var(--black-border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: var(--gold-dark);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .card-img {
            width: 100%; aspect-ratio: 4/3;
            object-fit: cover;
        }
        .card-body { padding: 14px 16px 16px; }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--white);
            margin-bottom: 6px;
        }
        .card-price {
            font-size: 15px;
            font-weight: 600;
            color: var(--gold);
        }

        /* ===== GRID ===== */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
        }
        @media (min-width: 480px) {
            .grid-2 { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
        @media (min-width: 768px) {
            .grid-2 { grid-template-columns: repeat(3, 1fr); }
        }

        /* ===== BTN ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: var(--black);
        }
        .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover { background: rgba(201,169,110,0.1); }
        .btn-full { width: 100%; }

        /* ===== SECTION ===== */
        .section { padding: 40px 0; }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10,10,10,0.98);
            border-top: 1px solid var(--black-border);
            display: flex;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav a {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 4px 8px;
            font-size: 10px;
            color: var(--gray);
            transition: all 0.2s;
            gap: 4px;
        }
        .bottom-nav a i { font-size: 18px; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }

        /* page bottom padding for bottom nav */
        .has-bottom-nav { padding-bottom: 70px; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--black-card);
            border: 1px solid var(--gold-dark);
            color: var(--white);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            white-space: nowrap;
            max-width: 90vw;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: flex-end;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--black-card);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--black-border);
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: var(--black-border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
        }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input {
            width: 100%;
            background: var(--black-soft);
            border: 1px solid var(--black-border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--white);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--gold-dark);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
        }
        .form-input::placeholder { color: var(--gray); }
        select.form-input { cursor: pointer; }

        /* ===== BADGE ===== */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-gold {
            background: rgba(201,169,110,0.15);
            color: var(--gold);
            border: 1px solid rgba(201,169,110,0.3);
        }

        /* ===== LOADING ===== */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(201,169,110,0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== GOLD GRADIENT TEXT ===== */
        .text-gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .has-bottom-nav { padding-bottom: 0; }
            .modal-overlay { align-items: center; }
            .modal {
                border-radius: 20px;
                max-width: 560px;
                margin: auto;
                max-height: 90vh;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Top Navigation -->
    <nav class="nav">
        <a href="/" class="nav-logo">{{ agency.name|truncatechars:20 }}</a>
        <div class="nav-menu">
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Bosh sahifa</a>
            <a href="/tabriklar/" {% if '/tabriklar' in request.path %}class="active"{% endif %}>Tabriklar</a>
            <a href="/bezaklar/" {% if '/bezaklar' in request.path %}class="active"{% endif %}>Bezaklar</a>
            <a href="/kontaktlar/" {% if '/kontaktlar' in request.path %}class="active"{% endif %}>Aloqa</a>
        </div>
        {% if agency.phone1 %}
        <a href="tel:{{ agency.phone1 }}" class="nav-call">
            <i class="fas fa-phone"></i>
        </a>
        {% endif %}
    </nav>

    <!-- Page Content -->
    <div class="page">
        {% block content %}{% endblock %}
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
            <i class="fas fa-home"></i>
            <span>Bosh</span>
        </a>
        <a href="/tabriklar/" {% if '/tabriklar' in request.path %}class="active"{% endif %}>
            <i class="fas fa-gift"></i>
            <span>Tabriklar</span>
        </a>
        <a href="/bezaklar/" {% if '/bezaklar' in request.path %}class="active"{% endif %}>
            <i class="fas fa-ring"></i>
            <span>Bezaklar</span>
        </a>
        <a href="/kontaktlar/" {% if '/kontaktlar' in request.path %}class="active"{% endif %}>
            <i class="fas fa-address-book"></i>
            <span>Aloqa</span>
        </a>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    function showToast(msg, duration = 3000) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }
    function openModal(id) {
        document.getElementById(id).classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
        document.body.style.overflow = '';
    }
    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target === el) closeModal(el.id);
        });
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
